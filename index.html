<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HITWH VEX ROBOTICS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <img src="img/logo.png" alt="战队Logo">
            <span>HITWH-VEX</span>
        </div>
    </nav>

    <!-- 头部横幅 -->
    <header class="banner">
        <div class="banner-bg" style="background-image: url('img/bg.jpg');"></div>
        <div class="banner-text">
            <h1>HITWH VEX ROBOTICS</h1>
            <p>哈尔滨工业大学（威海）VEX机器人实验室</p>
        </div>
    </header>

    <!-- 内容板块 -->
    <main class="content">
        <!-- 高光时刻 -->
        <section id="highlights" class="section">
            <h2>高光时刻</h2>
            <div class="gallery">
                <img src="img/match1.jpg" alt="比赛照片1">
                <img src="img/match2.jpg" alt="比赛照片2">
            </div>
        </section>

        <!-- 战队历史 -->
        <section id="history" class="section">
            <h2>战队历史</h2>
            <p>这里是HITWH-VEX东海穹卫战队</p>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 HITWH VEX ROBOTICS</p>
    </footer>
</body>
</html>
